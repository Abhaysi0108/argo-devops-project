apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
      - name: app
        image: python:3.11-slim
        command: ["sh", "-c"]
        args:
          - |
            echo "Hello DevOps 🚀 I am running inside Kubernetes!";